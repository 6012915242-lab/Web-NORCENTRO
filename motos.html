<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NORCENTRO - Catálogo de motos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="./assets/stiles/styless.css">
</head>

<body>

<!-- HEADER -->
<header class="site-header">
    <div class="header-inner wrap">
        <a href="index.html" class="navbar-brand">
            <img src="/assets/images/norcentro_logo.jpg" class="img-fluid d-md-none" style="max-height:55px;">
            <img src="/assets/images/norcentro_logo_completo.jpg" class="img-fluid d-none d-md-block" style="max-height:65px;">
        </a>

        <input type="checkbox" id="navToggle" class="nav-toggle">
        <label for="navToggle" class="nav-burger"><span></span><span></span><span></span></label>
        <label for="navToggle" class="nav-overlay"></label>

        <nav class="main-nav">
            <a href="index.html">Inicio</a>
            <a href="motos.html" class="activo">Motos</a>
            <a href="ofertas.html">Ofertas</a>
            <a href="contacto.html">Contacto</a>
            <a href="busqueda.html">Búsqueda</a>
        </nav>
    </div>
</header>

<!-- MAIN -->
<main class="wrap">

    <div class="page-head">
        <h1>Catálogo Completo</h1>
    </div>

    <!-- DEMO DOM -->
    <section class="mb-4 p-3 border rounded bg-light">
        <h2 id="demoTitulo">Evidencia inicial de DOM</h2>
        <p id="demoMensaje">Aquí se demuestra cómo cambiar contenido con JavaScript.</p>
        <button id="btnCambiar" class="btn-dark">Cambiar contenido</button>
    </section>

    <!-- FILTROS -->
    <input type="checkbox" id="filtToggle" class="filt-toggle">
    <label for="filtToggle" class="btn-filtros">Filtros ☰</label>
    <label for="filtToggle" class="filt-overlay"></label>

    <div class="catalog-layout">

        <aside class="filtros">
            <h3>Filtros</h3>

            <div class="filt-group">
                <h4>Precio máximo</h4>
                <input type="range" id="filtroPrecio" min="0" max="40000" value="40000">
                <div class="range-val"><span>$0</span><span>$40,000</span></div>
            </div>

            <div class="filt-group marca-group">
                <h4>Marca</h4>
                <label><input type="checkbox" value="Yamaha"> Yamaha</label>
                <label><input type="checkbox" value="Honda"> Honda</label>
                <label><input type="checkbox" value="KTM"> KTM</label>
                <label><input type="checkbox" value="Kawasaki"> Kawasaki</label>
                <label><input type="checkbox" value="Bajaj"> Bajaj</label>
                <label><input type="checkbox" value="Suzuki"> Suzuki</label>
                <label><input type="checkbox" value="TVS"> TVS</label>
                <label><input type="checkbox" value="Royal Enfield"> Royal Enfield</label>
            </div>

            <div class="filt-group tipo-group">
                <h4>Tipo</h4>
                <label><input type="checkbox" value="trabajo"> Trabajo</label>
                <label><input type="checkbox" value="urbana"> Urbana</label>
                <label><input type="checkbox" value="deportiva"> Deportiva</label>
                <label><input type="checkbox" value="adventure"> Adventure</label>
                <label><input type="checkbox" value="offroad"> Off-road</label>
            </div>
        </aside>

        <!-- CATÁLOGO DINÁMICO -->
        <div class="catalog-main">
            <div class="row g-4" id="contenedorMotos">
                <!-- JS render -->
            </div>
        </div>

    </div>

</main>

<!-- FOOTER -->
<footer class="site-footer">
    <div class="footer-top wrap">
        <a href="index.html" class="brand">NORCENTRO</a>

        <div class="social">
            <a href="#">FB</a>
            <a href="#">IG</a>
            <a href="#">TW</a>
        </div>

        <p>© 2026 NORCENTRO</p>
    </div>
</footer>

<!-- SCRIPTS -->
<script src="js/data.js"></script>
<script src="js/catalogo.js"></script>

<script>
document.getElementById("btnCambiar").addEventListener("click", () => {
    document.getElementById("demoTitulo").textContent = "DOM funcionando correctamente";
    document.getElementById("demoMensaje").textContent = "Ya estás listo para nivel universitario.";
});
</script>

</body>
</html>
