<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contacto — NORCENTRO</title>
  <link rel="stylesheet" href="./assets/stiles.css">
</head>
<body>

  <!-- HEADER -->
  <header>
    <nav aria-label="Navegación principal">
      <div class="logo"><h1>NOR<span>CENTER</span></h1></div>
      <input type="checkbox" id="menu-toggle">
      <label for="menu-toggle" class="hamburger-btn">
        <span></span>
        <span></span>
        <span></span>
      </label>
      <ul class="nav-links">
        <li><a href="./index.html">Inicio</a></li>
        <li><a href="./categoria.html">Motos</a></li>
        <li><a href="./ofertas.html">Ofertas</a></li>
        <li><a href="./contactanos.html" class="active">Contacto</a></li>
      </ul>
    </nav>
  </header>

  <main>

    <!-- TÍTULO -->
    <section class="contacto-hero">
      <h1>Contáctanos</h1>
    </section>

    <!-- FORMULARIO + INFO -->
    <div class="contacto-layout">

      <!-- FORMULARIO -->
      <div class="contacto-form">

        <div class="form-grupo">
          <label for="nombre">Nombre completo</label>
          <input type="text" id="nombre" name="nombre" placeholder="" autocomplete="name">
        </div>

        <div class="form-grupo">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="" autocomplete="email">
        </div>

        <div class="form-grupo">
          <label for="telefono">Teléfono</label>
          <input type="tel" id="telefono" name="telefono" placeholder="" autocomplete="tel">
        </div>

        <div class="form-grupo">
          <label for="asunto">Asunto</label>
          <select id="asunto" name="asunto">
            <option value="" disabled selected></option>
            <option value="compra">Consulta de compra</option>
            <option value="cotizacion">Cotización</option>
            <option value="servicio">Servicio técnico</option>
            <option value="otro">Otro</option>
          </select>
        </div>

        <div class="form-grupo">
          <label for="mensaje">Mensaje</label>
          <textarea id="mensaje" name="mensaje" rows="6"></textarea>
        </div>

        <button type="submit" class="btn-enviar">Enviar mensaje</button>

      </div>

      <!-- INFO DE CONTACTO -->
      <div class="contacto-info">

        <div class="info-item">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.15 13 19.79 19.79 0 0 1 1.08 4.38 2 2 0 0 1 3 2.18h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
          </svg>
          <span>Teléfono: +51 999 999 999</span>
        </div>

        <div class="info-item">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
          <span>Email: info@norcenter.pe</span>
        </div>

        <div class="info-item">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
            <circle cx="12" cy="10" r="3"/>
          </svg>
          <span>Dirección: Av. Principal 123,<br>Lima, Perú</span>
        </div>

        <div class="info-item">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
          <span>Horario: Lunes a Sábado<br>9:00 - 18:00</span>
        </div>

        <!-- MAPA -->
        <div class="mapa-placeholder" aria-label="Mapa de ubicación">
          <!-- Reemplaza el src con tu enlace de Google Maps embed -->
          <iframe
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3901.4!2d-77.0428!3d-12.0464!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMTLCsDAyJzQ3LjAiUyA3N8KwMDInMzQuMSJX!5e0!3m2!1ses!2spe!4v1234567890"
            width="100%"
            height="100%"
            style="border:0;"
            allowfullscreen=""
            loading="lazy"
            referrerpolicy="no-referrer-when-downgrade"
            title="Ubicación NORCENTRO"
          ></iframe>
        </div>

      </div>
    </div>

    <!-- REDES SOCIALES -->
    <section class="redes-sociales">
      <h2>Síguenos en redes</h2>
      <div class="redes-icons">

        <a href="#" aria-label="Facebook">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/>
          </svg>
        </a>

        <a href="#" aria-label="Instagram">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
            <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/>
            <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/>
          </svg>
        </a>

        <a href="#" aria-label="Twitter / X">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M23 3a10.9 10.9 0 0 1-3.14 1.53 4.48 4.48 0 0 0-7.86 3v1A10.66 10.66 0 0 1 3 4s-4 9 5 13a11.64 11.64 0 0 1-7 2c9 5 20 0 20-11.5a4.5 4.5 0 0 0-.08-.83A7.72 7.72 0 0 0 23 3z"/>
          </svg>
        </a>

      </div>
    </section>

  </main>

  <!-- FOOTER -->
  <footer>
    <div class="social-links" aria-label="Redes sociales">
      <a href="#" aria-label="Facebook">f</a>
      <a href="#" aria-label="Instagram">ig</a>
      <a href="#" aria-label="Twitter/X">x</a>
    </div>
    <p>&copy; 2026 NORCENTRO — Todos los derechos reservados</p>
  </footer>

</body>
</html>
